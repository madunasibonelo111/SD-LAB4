<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Info Finder</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Country Info Finder</h1>
    </header>

    <div class="search-container">
        <input type="text" id="country-input" placeholder="Enter a country">
        <button id="search-btn">Search</button>
    </div>

    <div id="loading-spinner" class="hidden spinner"></div>

    <div id="error-message" class="hidden error"></div>

    <div id="country-info" class="hidden"></div>

    <div id="bordering-countries" class="border-grid hidden"></div>

    <script src="script.js"></script>
</body>
</html>
